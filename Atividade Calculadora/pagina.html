<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function clicou() {
            let n1 = document.getElementById("n1").value;
            let dobro = n1 * 2;
            let triplo = n1 * 3;
            let quadruplo = n1 * 4;
            let quintuplo = n1 * 5;
            let sextuplo = n1 * 6;
            let quadrado = n1 ** 2;
            let cubo = n1 ** 3;
            let quartapotencia = n1 ** 4;
            let quintapotencia = n1 ** 5;
            let sextapotencia = n1 ** 6;
            document.getElementById("resposta1").innerHTML = `O dobro de ${n1} é ${dobro}`;
            document.getElementById("resposta2").innerHTML = `O triplo de ${n1} é ${triplo}`;
            document.getElementById("resposta3").innerHTML = `O quádruplo de ${n1} é ${quadruplo}`;
            document.getElementById("resposta4").innerHTML = `O quintuplo de ${n1} é ${quintuplo}`;
            document.getElementById("resposta5").innerHTML = `O sextuplo de ${n1} é ${sextuplo}`;
            document.getElementById("resposta6").innerHTML = `O quadrado de ${n1} é ${quadrado}`;
            document.getElementById("resposta7").innerHTML = `O cubo de ${n1} é ${cubo}`;
            document.getElementById("resposta8").innerHTML = `A quarta potência de ${n1} é ${quartapotencia}`;
            document.getElementById("resposta9").innerHTML = `A quinta potência de ${n1} é ${quintapotencia}`;
            document.getElementById("resposta10").innerHTML = `A sexta potência de ${n1} é ${sextapotencia}`;

            if (n1 % 2 === 0) {
                document.getElementById("resposta11").innerHTML = `O número é PAR`
            }
            else {
                document.getElementById("resposta11").innerHTML = `O número é ÍMPAR`
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Calculadora</h1> <hr>
            <label for="n1">Número:</label>
            <input type="number" id="n1" title="Insira um número!" required> <br>
            <input type="submit" value="Verificar" onclick="clicou()">
            <p id="resposta1"></p>
            <p id="resposta2"></p>
            <p id="resposta3"></p>
            <p id="resposta4"></p>
            <p id="resposta5"></p>
            <p id="resposta6"></p>
            <p id="resposta7"></p>
            <p id="resposta8"></p>
            <p id="resposta9"></p>
            <p id="resposta10"></p>
            <p id="resposta11"></p>
    </div>
</body>
</html>
