<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos Pessoais</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div id="container">
        <h1>Controle de Gastos Pessoais</h1>
        <!--ADD GASTOS-->
        <h2>Adicionar Gastos</h2>
        <label for="desc">Descrição:</label><input type="text" name="desc" id="desc" placeholder="Ex.: Almoço" title="Descreva o seu gasto">
        <label for="valor">Valor:</label><input type="number" name="valor" id="valor" placeholder="Ex.: 25.50" title="Insira o valor do seu gasto" min="0.10" step="0.01">
        <label for="categoria">Categoria:</label><input type="number" name="categoria" id="categoria" title="Descreva a categoria do seu gasto" placeholder="Ex.: Alimentação">
        <input type="submit" value="Adicionar" id="addgastos" onclick="addGasto()">
        
        <!--LISTA DE GASTOS-->
        <h2>Lista de Gastos</h2>
        <select id="filtro">
            <option value="todos">Todos</option>
            <option value="alimentacao">Alimentação</option>
            <option value="transporte">Transporte</option>
            <option value="lazer">Lazer</option>
        </select>

        <!--TOTAL-->
        <h2>Total Gasto: <span id="total">R$0,00</span></h2>
    </div>
</body>
</html>
