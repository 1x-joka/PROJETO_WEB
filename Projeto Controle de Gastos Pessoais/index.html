        <h1>Controle de Gastos Pessoais</h1>
        <!--ADD GASTOS-->
        <h2>Adicionar Gastos</h2>
        <label for="desc">Descrição:</label><input type="text" name="desc" id="desc" placeholder="Ex.: Almoço" title="Descreva o seu gasto">
        <label for="valor">Valor:</label><input type="number" name="valor" id="valor" placeholder="Ex.: 25.50" title="Insira o valor do seu gasto">
        <label for="categoria">Categoria:</label><input type="number" name="categoria" id="categoria" title="Descreva a categoria do seu gasto" placeholder="Ex.: Alimentação">
        <input type="submit" value="Adicionar" id="addgastos">
        
        <!--LISTA DE GASTOS-->
        <h2>Lista de Gastos</h2>
